<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>
<body>
    <h2 style="font-size:50px; display: flex; justify-content: center;">My Todo App</h2>
    <div style="height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center;">

        <div style="display:flex; gap:30px; align-items:center;">
    <input type="text", id="todoInput", placeholder="Enter Task"
    style="border-radius: 5px; padding: 10px 15px; width: 300px;">
    <button id="addBtn" style="color:white; background:green; border:none; border-radius:5px;
        padding:10px 15px; font-size:18px; font-weight:bold;">Add Task</button>
    </div>

    <ul id="todoList"  style="font-size:25px; list-style:circle; margin-top:30px; width:400px;"></ul>
    </div>

    <script src="/app.js"></script>
</body>
</html>
